services:
  - type: web
    name: rtts-mmo-demo
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run import:data && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: APP_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rtts-mmo-demo-db
          property: connectionString

databases:
  - name: rtts-mmo-demo-db
    plan: starter
